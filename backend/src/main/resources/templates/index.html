<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Policy Compliance System</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #ffe6f0, #e6f2ff);
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 85%;
            margin: auto;
        }

        h1 {
            text-align: center;
            color: #222;
            margin-bottom: 30px;
            font-size: 42px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            margin-bottom: 25px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-top: 12px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
        }

        .save-btn {
            background: green;
        }

        .load-btn {
            background: #007bff;
        }

        .reset-btn {
            background: #6c63ff;
        }

        .search-btn {
            background: orange;
        }

        .dashboard {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .box {
            flex: 1;
            color: white;
            padding: 25px;
            text-align: center;
            border-radius: 12px;
            font-size: 22px;
            font-weight: bold;
        }

        .green {
            background: #28a745;
        }

        .red {
            background: #dc3545;
        }

        .yellow {
            background: #f0ad4e;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
        }

        th {
            background: #007bff;
            color: white;
            padding: 12px;
        }

        td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: center;
        }

        tr:nth-child(even) {
            background: #f9f9f9;
        }

        h2 {
            color: #222;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Policy Compliance System</h1>

    <!-- SAVE POLICY -->

    <div class="card">

        <form action="/save" method="post" th:object="${policy}">

            <input type="text"
                   th:field="*{name}"
                   placeholder="Policy Name"
                   required>

            <input type="text"
                   th:field="*{input}"
                   placeholder="Input"
                   required>

            <select th:field="*{status}">

                <option value="COMPLIANT">COMPLIANT</option>

                <option value="NON_COMPLIANT">NON_COMPLIANT</option>

                <option value="PENDING">PENDING</option>

            </select>

            <div class="btn-group">

                <button type="submit"
                        class="save-btn">
                    Save Policy
                </button>

                <button type="button"
                        class="load-btn"
                        onclick="window.location='/'">
                    Load Policies
                </button>

                <button type="reset"
                        class="reset-btn">
                    Reset
                </button>

            </div>

        </form>

    </div>

    <!-- SEARCH -->

    <div class="card">

        <h2>Search by Status</h2>

        <form action="/search" method="get">

            <select name="status">

                <option value="COMPLIANT">COMPLIANT</option>

                <option value="NON_COMPLIANT">NON_COMPLIANT</option>

                <option value="PENDING">PENDING</option>

            </select>

            <button type="submit"
                    class="search-btn">
                Search
            </button>

        </form>

    </div>

    <!-- DASHBOARD -->

    <div class="dashboard">

        <div class="box green">
            <p th:text="${#lists.size(policies.?[status == 'COMPLIANT'])}"></p>
            Compliant
        </div>

        <div class="box red">
            <p th:text="${#lists.size(policies.?[status == 'NON_COMPLIANT'])}"></p>
            Non-Compliant
        </div>

        <div class="box yellow">
            <p th:text="${#lists.size(policies.?[status == 'PENDING'])}"></p>
            Pending
        </div>

    </div>

    <!-- TABLE -->

    <div class="card">

        <h2>Saved Policies</h2>

        <table>

            <thead>

            <tr>
                <th>ID</th>
                <th>Policy Name</th>
                <th>Input</th>
                <th>Status</th>
            </tr>

            </thead>

            <tbody>

            <tr th:each="policy : ${policies}">

                <td th:text="${policy.id}"></td>

                <td th:text="${policy.name}"></td>

                <td th:text="${policy.input}"></td>

                <td th:text="${policy.status}"></td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
