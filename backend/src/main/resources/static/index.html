<!DOCTYPE html>
<html>
<head>
    <title>Policy Compliance System</title>
</head>
<body>

<h1>Policy Compliance System</h1>

<p id="msg" style="color:green;"></p>

<input type="text" id="name" placeholder="Policy Name"><br><br>
<input type="text" id="input" placeholder="Input"><br><br>

<select id="status">
    <option value="COMPLIANT">COMPLIANT</option>
    <option value="PENDING">PENDING</option>
</select><br><br>

<button onclick="savePolicy()">Save Policy</button>
<button onclick="loadPolicies()">Load Policies</button>

<hr>

<h2>Search by Status</h2>
<input type="text" id="searchStatus" placeholder="Enter Status">
<button onclick="searchPolicy()">Search</button>

<hr>

<h3 id="count">Total Policies: 0</h3>

<div id="list"></div>

<script>

let editId = null;

// SAVE
function savePolicy() {
    let policy = {
        name: document.getElementById("name").value,
        input: document.getElementById("input").value,
        status: document.getElementById("status").value
    };

    let url = editId ? "/update/" + editId : "/save";
    let method = editId ? "PUT" : "POST";

    fetch(url, {
        method: method,
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(policy)
    })
    .then(res => res.json ? res.json() : res.text())
    .then(() => {
        document.getElementById("msg").innerText = "Saved Successfully!";
        clearForm();
        loadPolicies(); // 🔥 auto refresh
    });
}

// LOAD
function loadPolicies() {
    fetch("/getAll")
    .then(res => res.json())
    .then(data => showPolicies(data));
}

// SHOW LIST
function showPolicies(data) {
    let list = document.getElementById("list");
    list.innerHTML = "";

    document.getElementById("count").innerText = "Total Policies: " + data.length;

    data.forEach(p => {
        if (!p.name && !p.input) return; // ❌ skip empty

        list.innerHTML += `
            <hr>
            Name: ${p.name}<br>
            Input: ${p.input}<br>
            Status: ${p.status}<br>
            <button onclick="editPolicy(${p.id}, '${p.name}', '${p.input}', '${p.status}')">Edit</button>
            <button onclick="deletePolicy(${p.id})">Delete</button>
        `;
    });
}

// DELETE
function deletePolicy(id) {
    fetch("/delete/" + id, { method: "DELETE" })
    .then(() => loadPolicies()); // 🔥 auto refresh
}

// EDIT
function editPolicy(id, name, input, status) {
    editId = id;
    document.getElementById("name").value = name;
    document.getElementById("input").value = input;
    document.getElementById("status").value = status;
}

// SEARCH
function searchPolicy() {
    let status = document.getElementById("searchStatus").value;

    fetch("/search/" + status)
    .then(res => res.json())
    .then(data => showPolicies(data));
}

// CLEAR FORM
function clearForm() {
    editId = null;
    document.getElementById("name").value = "";
    document.getElementById("input").value = "";
}

</script>

</body>
</html>
