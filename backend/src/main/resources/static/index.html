<!DOCTYPE html>
<html>
<head>
    <title>Policy Compliance System</title>
</head>
<body>

<h2>Policy Compliance System</h2>

<input type="text" id="policyName" placeholder="Policy Name"><br><br>
<input type="text" id="inputText" placeholder="Input Text"><br><br>
<input type="text" id="status" placeholder="Status"><br><br>

<button onclick="savePolicy()">Save Policy</button>
<button onclick="loadPolicies()">Load Policies</button>

<hr>

<h3>🔍 Search by Status</h3>

<input type="text" id="searchStatus" placeholder="Enter Status (COMPLIANT)">
<button onclick="searchPolicy()">Search</button>

<hr>

<div id="result"></div>

<script>

function savePolicy() {
    const policy = {
        policyName: document.getElementById("policyName").value,
        inputText: document.getElementById("inputText").value,
        status: document.getElementById("status").value
    };

    fetch("http://localhost:8080/policies", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify(policy)
    }).then(() => {
        alert("Saved!");
    });
}

function loadPolicies() {
    fetch("http://localhost:8080/policies")
        .then(res => res.json())
        .then(data => display(data));
}

function searchPolicy() {
    const status = document.getElementById("searchStatus").value;

    fetch(`http://localhost:8080/policies/status/${status}`)
        .then(res => res.json())
        .then(data => display(data));
}

function deletePolicy(id) {
    fetch(`http://localhost:8080/policies/${id}`, {
        method: "DELETE"
    }).then(() => loadPolicies());
}

function display(data) {
    let output = "";
    data.forEach(p => {
        output += `
            <div>
                <p><b>Policy Name:</b> ${p.policyName}</p>
                <p><b>Input:</b> ${p.inputText}</p>
                <p><b>Status:</b> ${p.status}</p>
                <button onclick="deletePolicy(${p.id})">Delete</button>
            </div>
            <hr/>
        `;
    });
    document.getElementById("result").innerHTML = output;
}

</script>

</body>
</html>
