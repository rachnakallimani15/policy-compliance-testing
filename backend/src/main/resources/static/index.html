<!DOCTYPE html>
<html>
<head>
    <title>Policy Compliance System</title>
    <style>
        body {
            font-family: Arial;
            margin: 40px;
        }
        input, select {
            display: block;
            margin: 10px 0;
            padding: 8px;
            width: 250px;
        }
        button {
            padding: 8px 12px;
            margin-right: 10px;
        }
        .policy {
            border: 1px solid #ccc;
            padding: 10px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h1>Policy Compliance System</h1>

<input type="text" id="policyName" placeholder="Policy Name">
<input type="text" id="inputText" placeholder="Input Text">

<!-- UPDATED DROPDOWN -->
<select id="status">
    <option value="">Select Status</option>
    <option value="COMPLAINT">COMPLAINT</option>
    <option value="APPROVED">APPROVED</option>
    <option value="PENDING">PENDING</option>
</select>

<button onclick="savePolicy()">Save Policy</button>
<button onclick="loadPolicies()">Load Policies</button>

<hr>

<h2>Search by Status</h2>
<input type="text" id="searchStatus" placeholder="Enter Status">
<button onclick="searchByStatus()">Search</button>

<div id="policyList"></div>

<script>

let editId = null;

function savePolicy() {
    const name = document.getElementById("policyName").value;
    const input = document.getElementById("inputText").value;
    const status = document.getElementById("status").value;

    if (!name || !input || !status) {
        alert("All fields required!");
        return;
    }

    let url = "http://localhost:8080/policies";
    let method = "POST";

    if (editId) {
        url += "/" + editId;
        method = "PUT";
    }

    fetch(url, {
        method: method,
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            policyName: name,
            inputText: input,
            status: status
        })
    })
    .then(res => res.json())
    .then(() => {
        alert(editId ? "Updated!" : "Saved!");
        editId = null;
        clearForm();
        loadPolicies();
    });
}

function loadPolicies() {
    fetch("http://localhost:8080/policies")
    .then(res => res.json())
    .then(data => {
        displayPolicies(data);
    });
}

function displayPolicies(data) {
    const list = document.getElementById("policyList");
    list.innerHTML = "";

    data.forEach(p => {
        list.innerHTML += `
            <div class="policy">
                <p><b>Name:</b> ${p.policyName}</p>
                <p><b>Input:</b> ${p.inputText}</p>
                <p><b>Status:</b> ${p.status}</p>

                <button onclick="editPolicy(${p.id}, '${p.policyName}', '${p.inputText}', '${p.status}')">Edit</button>
                <button onclick="deletePolicy(${p.id})">Delete</button>
            </div>
        `;
    });
}

function deletePolicy(id) {
    fetch("http://localhost:8080/policies/" + id, {
        method: "DELETE"
    })
    .then(() => {
        alert("Deleted!");
        loadPolicies();
    });
}

function editPolicy(id, name, input, status) {
    document.getElementById("policyName").value = name;
    document.getElementById("inputText").value = input;
    document.getElementById("status").value = status;

    editId = id;
}

function searchByStatus() {
    const status = document.getElementById("searchStatus").value;

    fetch("http://localhost:8080/policies")
    .then(res => res.json())
    .then(data => {
        const filtered = data.filter(p => p.status === status);
        displayPolicies(filtered);
    });
}

function clearForm() {
    document.getElementById("policyName").value = "";
    document.getElementById("inputText").value = "";
    document.getElementById("status").value = "";
}

</script>

</body>
</html>
