<!DOCTYPE html>
<html>
<head>
    <title>Policy Compliance System</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        h2 {
            text-align: center;
            color: #2c6bed;
        }

        .card {
            background: white;
            padding: 20px;
            margin: 15px auto;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            max-width: 700px;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            margin-bottom: 10px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            margin-right: 10px;
        }

        .save { background: green; color: white; }
        .load { background: blue; color: white; }
        .search { background: orange; color: white; }
        .delete { background: red; color: white; }

        .status-badge {
            padding: 5px 10px;
            border-radius: 5px;
            color: white;
            font-size: 12px;
            display: inline-block;
        }

        .COMPLIANT { background: green; }
        .NON_COMPLIANT { background: red; }
        .PENDING { background: orange; }

    </style>
</head>

<body>

<h2>Policy Compliance System</h2>

<!-- FORM -->
<div class="card">
    <input id="name" placeholder="Policy Name">
    <input id="input" placeholder="Input">

    <select id="status">
        <option>COMPLIANT</option>
        <option>NON_COMPLIANT</option>
        <option>PENDING</option>
    </select>

    <button class="save" onclick="savePolicy()">Save Policy</button>
    <button class="load" onclick="loadPolicies()">Load Policies</button>
</div>

<!-- SEARCH -->
<div class="card">
    <h4>Search by Status</h4>
    <input id="searchStatus" placeholder="Enter Status">

    <button class="search" onclick="searchPolicy()">Search</button>
</div>

<!-- OUTPUT -->
<div class="card">
    <h4 id="total">Total Policies: 0</h4>
    <div id="result"></div>
</div>

<script>

function savePolicy() {
    const data = {
        name: document.getElementById("name").value,
        input: document.getElementById("input").value,
        status: document.getElementById("status").value
    };

    fetch("http://localhost:8080/save", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    })
    .then(() => loadPolicies());
}

function loadPolicies() {
    fetch("http://localhost:8080/getAll")
    .then(res => res.json())
    .then(data => display(data));
}

function searchPolicy() {
    const status = document.getElementById("searchStatus").value;

    fetch("http://localhost:8080/search/" + status)
    .then(res => res.json())
    .then(data => display(data));
}

function deletePolicy(id) {
    fetch("http://localhost:8080/delete/" + id, {
        method: "DELETE"
    })
    .then(() => loadPolicies());
}

function display(data) {
    const result = document.getElementById("result");
    result.innerHTML = "";

    document.getElementById("total").innerText =
        "Total Policies: " + data.length;

    data.forEach(p => {
        result.innerHTML += `
            <div class="card">
                <b>${p.name}</b><br>
                Input: ${p.input}<br><br>

                <span class="status-badge ${p.status}">
                    ${p.status}
                </span><br><br>

                <button class="delete" onclick="deletePolicy(${p.id})">
                    Delete
                </button>
            </div>
        `;
    });
}

</script>

</body>
</html>
